<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Shortlog</title>
    <style>
        /* 기본 설정: 화면 밖으로 내용이 새나가지 않게 함 */
        html, body { height: 100%; margin: 0; padding: 0; overflow: hidden; font-family: sans-serif; background: #f8f9fa; }
        
        /* [중요] 로그인 전/후 전용 컨테이너 */
        #auth-container, #app-container { height: 100%; width: 100%; display: none; }
        
        /* 로그인 화면 스타일 */
        #auth-container { 
            display: flex; flex-direction: column; justify-content: center; align-items: center; 
            background: white; position: fixed; top: 0; left: 0; z-index: 9999;
        }
        .login-logo { font-size: 3.5rem; font-weight: bold; color: #00c73c; margin-bottom: 10px; }
        .btn-google { background: #4285F4; color: white; border: none; padding: 15px 40px; border-radius: 30px; font-size: 1.1rem; font-weight: bold; cursor: pointer; }

        /* 앱 실행 화면 스타일 */
        .page { display: none; height: 100%; width: 100%; overflow-y: auto; padding-bottom: 80px; box-sizing: border-box; }
        .page.active { display: block; }
        
        header { background: white; padding: 15px 20px; border-bottom: 1px solid #eee; position: sticky; top: 0; z-index: 10; }
        header h1 { margin: 0; font-size: 1.2rem; color: #00c73c; }
        
        .search-box { margin: 15px; background: white; border: 1px solid #ddd; border-radius: 25px; padding: 5px 15px; display: flex; align-items: center; }
        .search-input { border: none; flex: 1; padding: 10px; outline: none; }

        /* 하단바 */
        nav { position: fixed; bottom: 0; width: 100%; height: 70px; background: white; border-top: 1px solid #eee; display: flex; justify-content: space-around; align-items: center; }
        .nav-btn { background: none; border: none; font-size: 0.8rem; color: #aaa; display: flex; flex-direction: column; align-items: center; cursor: pointer; }
        .nav-btn.active { color: #00c73c; font-weight: bold; }
    </style>
</head>
<body>

    <div id="auth-container">
        <div class="login-logo">Shortlog</div>
        <p style="color: #666; margin-bottom: 40px;">한 문장으로 기록하는 나의 일상</p>
        <button id="btn-login" class="btn-google">구글로 시작하기</button>
    </div>

    <div id="app-container">
        <div id="page-home" class="page active">
            <header><h1>홈 피드</h1></header>
            <div class="search-box">
                <input type="text" class="search-input" placeholder="키워드로 문장 검색...">
                <span>🔍</span>
            </div>
            <div id="post-list" style="padding: 0 15px;">
                </div>
        </div>

        <div id="page-friends" class="page">
            <header><h1>친구</h1></header>
            <p style="text-align:center; color:#999; margin-top:50px;">팔로우한 친구가 없습니다.</p>
        </div>

        <div id="page-profile" class="page">
            <header>
                <h1>내 블로그</h1>
                <button id="btn-logout" style="background:none; border:none; color:#999;">로그아웃</button>
            </header>
            <div style="padding: 20px;">
                <h2 id="user-display-name">사용자</h2>
                <p id="user-display-email" style="color:#888;"></p>
            </div>
        </div>

        <nav>
            <button class="nav-btn active" onclick="showPage('page-home', this)"><span>🏠</span>홈</button>
            <button class="nav-btn" onclick="showPage('page-friends', this)"><span>👥</span>친구</button>
            <button class="nav-btn" onclick="showPage('page-profile', this)"><span>👤</span>내 블로그</button>
        </nav>
    </div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-app.js";
    import { getAuth, signInWithPopup, GoogleAuthProvider, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-auth.js";
    import { getFirestore, collection, getDocs, query, orderBy } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyCyCdlkXcLMvGO3NVg5QPQsPMPrd_JyaUY",
        authDomain: "shortlog-0.firebaseapp.com",
        projectId: "shortlog-0",
        storageBucket: "shortlog-0.firebasestorage.app",
        messagingSenderId: "538600152456",
        appId: "1:538600152456:web:f53e5b62320ba391b02e3d"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);
    const provider = new GoogleAuthProvider();

    // 탭 전환 함수
    window.showPage = (pageId, btn) => {
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
        document.getElementById(pageId).classList.add('active');
        document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
    };

    // 로그인/로그아웃 버튼
    document.getElementById('btn-login').onclick = () => signInWithPopup(auth, provider);
    document.getElementById('btn-logout').onclick = () => signOut(auth);

    // [핵심] 로그인 상태에 따른 '컨테이너' 제어
    onAuthStateChanged(auth, (user) => {
        const authCont = document.getElementById('auth-container');
        const appCont = document.getElementById('app-container');

        if (user) {
            // 로그인 됨: 로그인 화면 완전히 제거, 앱 화면 표시
            authCont.style.setProperty('display', 'none', 'important');
            appCont.style.display = 'block';
            
            document.getElementById('user-display-name').innerText = user.displayName;
            document.getElementById('user-display-email').innerText = user.email;
            loadPosts();
        } else {
            // 로그아웃 됨: 앱 화면 제거, 로그인 화면 표시
            authCont.style.setProperty('display', 'flex', 'important');
            appCont.style.display = 'none';
        }
    });

    async function loadPosts() {
        const list = document.getElementById('post-list');
        list.innerHTML = "<p style='text-align:center;'>데이터 로딩 중...</p>";
        try {
            const q = query(collection(db, "posts"), orderBy("timestamp", "desc"));
            const snap = await getDocs(q);
            list.innerHTML = "";
            snap.forEach(doc => {
                const d = doc.data();
                list.innerHTML += `<div style="background:white; padding:15px; border-radius:10px; margin-bottom:10px; box-shadow:0 2px 5px rgba(0,0,0,0.05);">
                    <p style="margin:0 0 10px 0; font-size:1rem;">${d.text}</p>
                    <small style="color:#888;">BY ${d.nickname} · ${d.time}</small>
                </div>`;
            });
        } catch(e) { list.innerHTML = "데이터를 가져오지 못했습니다."; }
    }
</script>
</body>
</html>
