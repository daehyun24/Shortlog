<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shortlog - 연결 확인용</title>
    <style>
        body { margin: 0; font-family: sans-serif; }
        /* 모든 화면은 기본적으로 숨김 */
        .page { display: none; height: 100vh; width: 100%; text-align: center; padding-top: 100px; }
        /* active 클래스가 붙은 페이지만 보여줌 */
        .active { display: block !important; }
        button { padding: 15px 30px; font-size: 18px; cursor: pointer; background: #00c73c; color: white; border: none; border-radius: 5px; }
    </style>
</head>
<body>

    <div id="page-login" class="page active">
        <h1>Shortlog</h1>
        <p>로그인이 필요합니다.</p>
        <button id="btn-login">구글 계정으로 로그인</button>
    </div>

    <div id="page-home" class="page">
        <h1 id="welcome-msg">환영합니다!</h1>
        <p>여기가 홈 피드 화면입니다.</p>
        <button id="btn-logout" style="background: #888;">로그아웃</button>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-app.js";
        import { getAuth, signInWithPopup, GoogleAuthProvider, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-auth.js";

        // 대현님의 설정값
        const firebaseConfig = {
            apiKey: "AIzaSyCyCdlkXcLMvGO3NVg5QPQsPMPrd_JyaUY",
            authDomain: "shortlog-0.firebaseapp.com",
            projectId: "shortlog-0",
            storageBucket: "shortlog-0.firebasestorage.app",
            messagingSenderId: "538600152456",
            appId: "1:538600152456:web:f53e5b62320ba391b02e3d"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const provider = new GoogleAuthProvider();

        // [핵심 로직] 화면 전환 함수
        function showPage(pageId) {
            console.log("화면 전환 시도:", pageId);
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            const target = document.getElementById(pageId);
            if (target) {
                target.classList.add('active');
            } else {
                console.error("해당 ID의 페이지가 없습니다:", pageId);
            }
        }

        // 로그인 버튼 클릭
        document.getElementById('btn-login').onclick = () => {
            console.log("로그인 버튼 클릭됨");
            signInWithPopup(auth, provider)
                .then((result) => {
                    console.log("로그인 성공:", result.user);
                })
                .catch((error) => {
                    console.error("로그인 에러:", error);
                    alert("로그인 실패! 사유: " + error.message + "\nFirebase 콘솔에서 도메인 설정을 확인하세요.");
                });
        };

        // 로그아웃 버튼 클릭
        document.getElementById('btn-logout').onclick = () => {
            signOut(auth);
        };

        // [근원적 해결] Firebase가 상태 변화를 감지하면 '무조건' 화면을 바꿉니다.
        onAuthStateChanged(auth, (user) => {
            if (user) {
                console.log("사용자 확인됨:", user.displayName);
                document.getElementById('welcome-msg').innerText = user.displayName + "님, 반가워요!";
                showPage('page-home'); // 홈 화면으로 강제 이동
            } else {
                console.log("사용자 없음 (로그아웃 상태)");
                showPage('page-login'); // 로그인 화면으로 강제 이동
            }
        });
    </script>
</body>
</html>
