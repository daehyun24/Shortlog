<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Shortlog</title>
    <style>
        /* [기본 레이아웃 - 유저 제공 코드 유지] */
        html, body { height: 100%; margin: 0; padding: 0; overflow: hidden; font-family: 'Pretendard', sans-serif; background: #f8f9fa; }
        #auth-container, #app-container, #join-container { height: 100%; width: 100%; display: none; }
        
        /* 로그인 화면 */
        #auth-container { display: flex; flex-direction: column; justify-content: center; align-items: center; background: white; position: fixed; top: 0; left: 0; z-index: 9999; }
        .login-logo { font-size: 3.5rem; font-weight: bold; color: #00c73c; margin-bottom: 10px; }
        .btn-google { background: #4285F4; color: white; border: none; padding: 15px 40px; border-radius: 30px; font-size: 1.1rem; font-weight: bold; cursor: pointer; box-shadow: 0 4px 15px rgba(66,133,244,0.3); }

        /* [추가] 온보딩(아이디 설정) 화면 */
        #join-container { display: flex; flex-direction: column; justify-content: center; align-items: center; background: white; z-index: 9998; padding: 20px; box-sizing: border-box; }

        /* 앱 내부 화면 공통 */
        .page { display: none; height: 100%; width: 100%; overflow-y: auto; padding-bottom: 100px; box-sizing: border-box; background: #f8f9fa; }
        .page.active { display: block; }
        
        header { background: white; padding: 15px 20px; border-bottom: 1px solid #eee; position: sticky; top: 0; z-index: 100; display: flex; justify-content: space-between; align-items: center; }
        header h1 { margin: 0; font-size: 1.2rem; color: #00c73c; }

        /* [수정] 포스트 카드 (제목/미리보기 반영) */
        .post-card { background: white; padding: 20px; border-radius: 15px; margin: 15px; box-shadow: 0 2px 8px rgba(0,0,0,0.05); cursor: pointer; }
        .post-title { font-size: 1.1rem; font-weight: bold; margin: 0 0 8px 0; color: #222; }
        .post-preview { font-size: 0.95rem; color: #666; line-height: 1.5; overflow: hidden; text-overflow: ellipsis; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; }

        /* [추가] 상세 페이지 문장 시스템 */
        .sentence { padding: 15px; border-bottom: 1px solid #f1f1f1; font-size: 1.1rem; line-height: 1.6; cursor: pointer; }
        .sentence.selected { background: #e8f9ed; border-left: 5px solid #00c73c; font-weight: bold; }
        .comment-box { background: white; padding: 20px; border-top: 1px solid #eee; }
        .comment-item { padding: 8px 0; border-bottom: 1px solid #f9f9f9; font-size: 0.9rem; }

        /* 공통 버튼 & 입력 */
        .input-main { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 10px; margin-bottom: 10px; box-sizing: border-box; }
        .btn-send { background: #00c73c; color: white; border: none; padding: 10px 25px; border-radius: 10px; font-weight: bold; cursor: pointer; }
        .btn-send:disabled { background: #ccc; }

        .fab { position: fixed; bottom: 90px; right: 20px; background: #00c73c; color: white; width: 56px; height: 56px; border-radius: 50%; display: flex; justify-content: center; align-items: center; font-size: 2rem; box-shadow: 0 4px 12px rgba(0,199,60,0.4); border: none; cursor: pointer; z-index: 900; }
        nav { position: fixed; bottom: 0; width: 100%; height: 75px; background: white; border-top: 1px solid #eee; display: flex; justify-content: space-around; align-items: center; z-index: 1000; }
        
        #write-modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); z-index: 10000; justify-content: center; align-items: center; }
        .modal-content { background: white; width: 90%; max-width: 400px; padding: 25px; border-radius: 20px; }
    </style>
</head>
<body>

    <div id="auth-container">
        <div class="login-logo">Shortlog</div>
        <p style="color: #666; margin-bottom: 40px;">한 문장으로 기록하는 나의 일상</p>
        <button id="btn-login" class="btn-google">구글로 시작하기</button>
    </div>

    <div id="join-container">
        <h2 style="color:#00c73c">환영합니다!</h2>
        <p style="color:#666; margin-bottom:30px;">사용하실 아이디와 닉네임을 정해주세요.</p>
        <input id="join-id" class="input-main" placeholder="고유 아이디 (영문/숫자)">
        <input id="join-nick" class="input-main" placeholder="닉네임">
        <button id="btn-join-submit" class="btn-send" style="width:100%; padding:15px;">시작하기</button>
    </div>

    <div id="app-container">
        
        <div id="page-home" class="page active">
            <header><h1>Shortlog</h1></header>
            <div id="post-list"></div>
        </div>

        <div id="page-detail" class="page">
            <header>
                <button onclick="goHome()" style="background:none; border:none; font-size:1.5rem;">←</button>
                <h1 style="font-size:1rem; color:#333;">기록 읽기</h1>
                <div style="width:24px;"></div>
            </header>
            <div id="detail-content">
                <div style="padding:25px 20px; background:white;">
                    <h2 id="det-title" style="margin:0;"></h2>
                    <p id="det-author" style="color:#999; font-size:0.85rem; margin:10px 0 0 0;"></p>
                </div>
                <div id="det-sentences"></div>
                <div class="comment-box">
                    <p id="comment-label" style="font-size:0.8rem; color:#00c73c; font-weight:bold;">전체 글에 댓글 달기</p>
                    <div style="display:flex; gap:10px;">
                        <input id="comment-input" class="input-main" placeholder="댓글 입력..." style="margin:0;">
                        <button id="btn-comment-submit" class="btn-send">등록</button>
                    </div>
                    <div id="comment-list" style="margin-top:20px;"></div>
                </div>
            </div>
        </div>

        <div id="page-profile" class="page">
            <header>
                <h1>내 블로그</h1>
                <button id="btn-logout" style="background:none; border:none; color:#999;">로그아웃</button>
            </header>
            <div id="my-info-card" style="padding:25px; background:white; margin:15px; border-radius:15px; text-align:center;">
                <h2 id="display-nick" style="margin-bottom:5px;">사용자</h2>
                <p id="display-id" style="color:#888; margin-top:0; font-size:0.9rem;"></p>
            </div>
            <div id="my-post-list"></div>
        </div>

        <button class="fab" id="btn-open-write">＋</button>
        
        <nav>
            <button class="nav-btn active" onclick="changeTab('page-home', this)"><span>🏠</span>홈</button>
            <button class="nav-btn" onclick="changeTab('page-profile', this)"><span>👤</span>내 블로그</button>
        </nav>

        <div id="write-modal">
            <div class="modal-content">
                <h3 style="margin:0 0 15px 0;">기록하기</h3>
                <input id="write-title" class="input-main" placeholder="제목을 입력하세요">
                <textarea id="write-body" style="width:100%; height:150px; border:1px solid #eee; border-radius:12px; padding:15px; box-sizing:border-box; outline:none;" placeholder="본문을 입력하세요 (엔터로 문장 구분)"></textarea>
                <div style="display:flex; justify-content:flex-end; gap:10px; margin-top:20px;">
                    <button id="btn-close-write" class="btn-send" style="background:#f1f1f1; color:#666;">취소</button>
                    <button id="btn-submit-write" class="btn-send">공유하기</button>
                </div>
            </div>
        </div>
    </div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-app.js";
    import { getAuth, signInWithPopup, GoogleAuthProvider, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-auth.js";
    import { getFirestore, doc, setDoc, getDoc, collection, query, where, getDocs, orderBy, addDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyCyCdlkXcLMvGO3NVg5QPQsPMPrd_JyaUY",
        authDomain: "shortlog-0.firebaseapp.com",
        projectId: "shortlog-0",
        storageBucket: "shortlog-0.firebasestorage.app",
        messagingSenderId: "538600152456",
        appId: "1:538600152456:web:f53e5b62320ba391b02e3d"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);
    const provider = new GoogleAuthProvider();

    let myInfo = null;
    let currentDetailId = null;
    let selectedIdx = -1;

    // 탭 전환
    window.changeTab = (pageId, btn) => {
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
        document.getElementById(pageId).classList.add('active');
        document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
        if(btn) btn.classList.add('active');
    };

    window.goHome = () => changeTab('page-home', document.querySelector('.nav-btn:first-child'));

    // 인증 감지 (롤백된 로직 기반)
    onAuthStateChanged(auth, async (user) => {
        const authUI = document.getElementById('auth-container');
        const joinUI = document.getElementById('join-container');
        const appUI = document.getElementById('app-container');

        if (user) {
            authUI.style.display = 'none';
            const userDoc = await getDoc(doc(db, "users", user.uid));
            if (userDoc.exists()) {
                myInfo = userDoc.data();
                joinUI.style.display = 'none';
                appUI.style.display = 'block';
                document.getElementById('display-nick').innerText = myInfo.nickname;
                document.getElementById('display-id').innerText = "@" + myInfo.customId;
                loadPosts();
            } else {
                joinUI.style.display = 'flex';
                appUI.style.display = 'none';
            }
        } else {
            authUI.style.display = 'flex';
            joinUI.style.display = 'none';
            appUI.style.display = 'none';
        }
    });

    // 가입 처리 (고유 아이디)
    document.getElementById('btn-join-submit').onclick = async () => {
        const cid = document.getElementById('join-id').value.trim();
        const nick = document.getElementById('join-nick').value.trim();
        if(!cid || !nick) return alert("아이디와 닉네임을 입력해주세요.");

        const q = query(collection(db, "users"), where("customId", "==", cid));
        const snap = await getDocs(q);
        if(!snap.empty) return alert("이미 사용 중인 아이디입니다.");

        const userData = { uid: auth.currentUser.uid, customId: cid, nickname: nick };
        await setDoc(doc(db, "users", auth.currentUser.uid), userData);
        myInfo = userData;
        document.getElementById('join-container').style.display = 'none';
        document.getElementById('app-container').style.display = 'block';
        loadPosts();
    };

    // 글쓰기 (중복 방지 & 제목/본문 분리)
    const modal = document.getElementById('write-modal');
    document.getElementById('btn-open-write').onclick = () => modal.style.display = 'flex';
    document.getElementById('btn-close-write').onclick = () => modal.style.display = 'none';

    document.getElementById('btn-submit-write').onclick = async () => {
        const title = document.getElementById('write-title').value.trim();
        const body = document.getElementById('write-body').value.trim();
        if(!title || !body) return alert("내용을 채워주세요.");

        const btn = document.getElementById('btn-submit-write');
        btn.disabled = true; // 중복 방지

        try {
            await addDoc(collection(db, "posts"), {
                title, content: body, uid: myInfo.uid, authorNick: myInfo.nickname, authorId: myInfo.customId,
                timestamp: serverTimestamp(), time: new Date().toLocaleTimeString('ko-KR', { hour: '2-digit', minute: '2-digit' })
            });
            modal.style.display = 'none';
            document.getElementById('write-title').value = "";
            document.getElementById('write-body').value = "";
            loadPosts();
        } catch (e) { alert("저장 실패"); }
        btn.disabled = false;
    };

    // 포스트 로드 (미리보기 반영)
    async function loadPosts() {
        const homeList = document.getElementById('post-list');
        const myList = document.getElementById('my-post-list');
        homeList.innerHTML = ""; myList.innerHTML = "";

        const q = query(collection(db, "posts"), orderBy("timestamp", "desc"));
        const snap = await getDocs(q);

        snap.forEach(docSnap => {
            const d = docSnap.data();
            const firstLine = d.content.split('\n')[0];
            const preview = firstLine.length > 50 ? firstLine.substring(0, 50) + "..." : firstLine;

            const card = document.createElement('div');
            card.className = 'post-card';
            card.onclick = () => openDetail(docSnap.id, d);
            card.innerHTML = `
                <div class="post-title">${d.title}</div>
                <div class="post-preview">${preview}</div>
                <div style="font-size:0.8rem; color:#999; margin-top:10px;">by ${d.authorNick}</div>
            `;
            homeList.appendChild(card.cloneNode(true));
            if(d.uid === myInfo.uid) myList.appendChild(card);
        });
    }

    // 상세 보기 & 문장별 댓글
    window.openDetail = (id, data) => {
        currentDetailId = id;
        selectedIdx = -1;
        document.getElementById('det-title').innerText = data.title;
        document.getElementById('det-author').innerText = `${data.authorNick} (@${data.authorId})`;
        
        const sentBox = document.getElementById('det-sentences');
        sentBox.innerHTML = "";
        const lines = data.content.split('\n').filter(l => l.trim() !== "");
        lines.forEach((line, idx) => {
            const div = document.createElement('div');
            div.className = 'sentence';
            div.innerText = line;
            div.onclick = () => {
                document.querySelectorAll('.sentence').forEach(s => s.classList.remove('selected'));
                div.classList.add('selected');
                selectedIdx = idx;
                document.getElementById('comment-label').innerText = `[${idx+1}번 문장]에 댓글 달기`;
                loadComments();
            };
            sentBox.appendChild(div);
        });
        loadComments();
        changeTab('page-detail');
    };

    document.getElementById('btn-comment-submit').onclick = async () => {
        const inp = document.getElementById('comment-input');
        if(!inp.value.trim()) return;
        await addDoc(collection(db, "comments"), {
            postId: currentDetailId, sentenceIdx: selectedIdx, text: inp.value,
            authorNick: myInfo.nickname, timestamp: serverTimestamp()
        });
        inp.value = "";
        loadComments();
    };

    async function loadComments() {
        const list = document.getElementById('comment-list');
        list.innerHTML = "";
        const q = query(collection(db, "comments"), where("postId", "==", currentDetailId), where("sentenceIdx", "==", selectedIdx), orderBy("timestamp", "asc"));
        const snap = await getDocs(q);
        snap.forEach(d => {
            const c = d.data();
            list.innerHTML += `<div class="comment-item"><b>${c.authorNick}</b>: ${c.text}</div>`;
        });
    }

    document.getElementById('btn-login').onclick = () => signInWithPopup(auth, provider);
    document.getElementById('btn-logout').onclick = () => signOut(auth);
</script>
</body>
</html>
